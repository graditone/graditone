name: Build Android AAB

on:
  push:
    tags:
      - 'v*'
  # Also trigger when deploy-pwa.yml completes (it creates v* tags via GITHUB_TOKEN,
  # which does not re-trigger push.tags events due to GitHub's loop-prevention policy).
  workflow_run:
    workflows: ["Deploy PWA to GitHub Pages"]
    types:
      - completed
    branches:
      - main
  workflow_dispatch:
    inputs:
      version_override:
        description: 'Version override (e.g. 0.1.70) — leave blank to read from frontend/package.json'
        required: false
        default: ''

permissions:
  contents: read

jobs:
  build-android:
    name: Build signed release AAB
    runs-on: ubuntu-latest
    # For workflow_run triggers: only run if the upstream workflow succeeded.
    # For push/manual triggers: always run.
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}

    steps:
      # ── Checkout ────────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── Guard: skip if android Gradle project not yet initialised ────────────
      - name: Check android project exists
        id: android_check
        run: |
          if [ ! -f "android/gradlew" ]; then
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "::warning::android/gradlew not found — skipping build. Run 'bubblewrap init' first (T004)."
          else
            echo "exists=true" >> "$GITHUB_OUTPUT"
          fi

      # ── Determine version ────────────────────────────────────────────────────
      - name: Compute versionName and versionCode
        id: version
        if: steps.android_check.outputs.exists == 'true'
        run: |
          if [ -n "${{ github.event.inputs.version_override }}" ]; then
            VERSION="${{ github.event.inputs.version_override }}"
          else
            VERSION=$(node -p "require('./frontend/package.json').version")
          fi

          echo "versionName=${VERSION}" >> "$GITHUB_OUTPUT"

          # Parse semver components; default minor/patch to 0 if absent
          MAJOR=$(echo "$VERSION" | cut -d. -f1)
          MINOR=$(echo "$VERSION" | cut -d. -f2)
          PATCH=$(echo "$VERSION" | cut -d. -f3)
          MAJOR=${MAJOR:-0}
          MINOR=${MINOR:-0}
          PATCH=${PATCH:-0}

          # versionCode = major×10000 + minor×100 + patch
          VERSION_CODE=$(( MAJOR * 10000 + MINOR * 100 + PATCH ))
          echo "versionCode=${VERSION_CODE}" >> "$GITHUB_OUTPUT"

          echo "versionName=${VERSION}, versionCode=${VERSION_CODE}"

      # ── Java & Android SDK ───────────────────────────────────────────────────
      - name: Set up Java 17
        if: steps.android_check.outputs.exists == 'true'
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Android SDK
        if: steps.android_check.outputs.exists == 'true'
        uses: android-actions/setup-android@v3

      # ── Google Services (Firebase) ───────────────────────────────────────────
      - name: Restore google-services.json
        if: steps.android_check.outputs.exists == 'true'
        env:
          GOOGLE_SERVICES_JSON_BASE64: ${{ secrets.GOOGLE_SERVICES_JSON_BASE64 }}
        run: |
          echo "$GOOGLE_SERVICES_JSON_BASE64" | base64 --decode > android/app/google-services.json

      # ── Signing keystore ─────────────────────────────────────────────────────
      - name: Restore release keystore
        if: steps.android_check.outputs.exists == 'true'
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          echo "$ANDROID_KEYSTORE_BASE64" | base64 --decode > android/app/graditone-release.keystore

      # ── Inject signing config into gradle.properties ─────────────────────────
      - name: Write signing properties
        if: steps.android_check.outputs.exists == 'true'
        run: |
          cat >> android/gradle.properties << EOF
          RELEASE_STORE_FILE=graditone-release.keystore
          RELEASE_KEY_ALIAS=${{ secrets.ANDROID_KEY_ALIAS }}
          RELEASE_KEY_PASSWORD=${{ secrets.ANDROID_KEY_PASSWORD }}
          RELEASE_STORE_PASSWORD=${{ secrets.ANDROID_STORE_PASSWORD }}
          EOF

      # ── Inject versionCode / versionName ────────────────────────────────────
      - name: Set version in gradle.properties
        if: steps.android_check.outputs.exists == 'true'
        run: |
          cat >> android/gradle.properties << EOF
          APP_VERSION_CODE=${{ steps.version.outputs.versionCode }}
          APP_VERSION_NAME=${{ steps.version.outputs.versionName }}
          EOF

      # ── Build signed release AAB ─────────────────────────────────────────────
      - name: Build release AAB
        if: steps.android_check.outputs.exists == 'true'
        working-directory: android
        run: |
          chmod +x gradlew
          ./gradlew bundleRelease

      # ── Upload artifact ───────────────────────────────────────────────────────
      - name: Upload AAB artifact
        if: steps.android_check.outputs.exists == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: graditone-${{ steps.version.outputs.versionName }}-release
          path: android/app/build/outputs/bundle/release/app-release.aab
          retention-days: 30

      # ── Deploy to Google Play ─────────────────────────────────────────────────
      - name: Upload to Google Play
        if: steps.android_check.outputs.exists == 'true' && secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON != ''
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON }}
          packageName: com.graditone.app
          releaseFiles: android/app/build/outputs/bundle/release/app-release.aab
          track: production
          status: completed
          whatsNewDirectory: android/whatsnew

      # ── Summary ───────────────────────────────────────────────────────────────
      - name: Print build summary
        if: steps.android_check.outputs.exists == 'true'
        run: |
          echo "### Android Build Summary" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Field | Value |" >> "$GITHUB_STEP_SUMMARY"
          echo "|-------|-------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| versionName | ${{ steps.version.outputs.versionName }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| versionCode | ${{ steps.version.outputs.versionCode }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Artifact | graditone-${{ steps.version.outputs.versionName }}-release |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Play Store | ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON != '' && 'Uploaded to production track' || 'Skipped (GOOGLE_PLAY_SERVICE_ACCOUNT_JSON not set)' }} |" >> "$GITHUB_STEP_SUMMARY"
